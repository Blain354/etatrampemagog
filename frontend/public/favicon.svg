<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Anchor icon for boat ramp status -->
  <circle cx="16" cy="16" r="15" fill="#1a73e8"/>
  <!-- Anchor shank -->
  <rect x="15" y="6" width="2" height="16" rx="1" fill="white"/>
  <!-- Anchor ring -->
  <circle cx="16" cy="8" r="3" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Anchor arms -->
  <path d="M10 22 C10 18, 12 16, 16 16 C20 16, 22 18, 22 22" 
        fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Anchor flukes (left and right) -->
  <path d="M8 22 L12 26 L10 28 L6 24 Z" fill="white"/>
  <path d="M24 22 L20 26 L22 28 L26 24 Z" fill="white"/>
</svg>
